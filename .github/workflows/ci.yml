name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore backend
        run: dotnet restore backend/MDA.API/MDA.API.csproj

      - name: Build backend
        run: dotnet build backend/MDA.API/MDA.API.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test backend/MDA.API.Tests/MDA.API.Tests.csproj --configuration Release

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
